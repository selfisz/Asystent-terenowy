<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asystent Egzekucji</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #6366f1;
            --primary-light: #e0e7ff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --warning-bg: #fef9c3;
            --warning-text: #854d0e;
            --star: #eab308;
            --radius: 20px;
            --shadow: 0 4px 15px rgba(0,0,0,0.04);
            --nav-height: 85px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-dark); padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom)); overscroll-behavior-y: none; }

        /* HEADER & SEARCH */
        .header { padding: calc(20px + env(safe-area-inset-top)) 20px 15px; font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: space-between; }
        .search-bar-container { padding: 0 20px 15px 20px; }
        .search-input { width: 100%; padding: 14px 18px 14px 45px; border-radius: 14px; border: none; background: var(--card-bg) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16" fill="%2364748b"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>') no-repeat 18px center; box-shadow: var(--shadow); font-size: 15px; outline: none; transition: 0.2s;}
        
        .view-section { display: none; padding: 0 20px; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* FILTERS */
        .filters { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 8px 16px; background: #e2e8f0; border-radius: 12px; font-weight: 600; font-size: 14px; border: none; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.2s; display: flex; align-items: center; gap: 6px;}
        .filter-btn.active { background: var(--primary-light); color: var(--primary); box-shadow: 0 2px 8px rgba(99,102,241,0.2); }
        .filter-btn.star-filter { background: #fef9c3; color: #a16207; }
        
        /* CARDS */
        .list-container { overflow-x: hidden; padding-bottom: 20px; }
        .swipe-container { position: relative; margin-bottom: 12px; border-radius: var(--radius); overflow: hidden; background: var(--danger); touch-action: pan-y; }
        .card-content { position: relative; background: var(--card-bg); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); z-index: 2; transition: transform 0.2s ease-out; }
        .delete-bg { position: absolute; top: 0; right: 0; width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; z-index: 1; }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .icon-box { font-size: 26px; margin-right: 12px; background: #f8fafc; width: 48px; height: 48px; display: flex; justify-content: center; align-items: center; border-radius: 14px; color: var(--text-dark);}
        .plate { font-weight: 800; font-size: 17px; display: flex; align-items: center; gap: 8px;}
        .star-icon { color: #cbd5e1; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .star-icon.active { color: var(--star); }
        .lp-badge { font-size: 10px; font-weight: 800; color: white; background: #475569; padding: 4px 8px; border-radius: 6px; }
        .year { font-size: 11px; font-weight: 700; color: white; background: #94a3b8; padding: 4px 8px; border-radius: 6px; }
        .desc { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }
        .vin { font-size: 11px; font-family: monospace; color: var(--text-muted); margin-top: 6px; background: #f1f5f9; padding: 6px 10px; border-radius: 8px; display: inline-block; font-weight:600;}
        .wycena-badge { background: #fee2e2; color: #b91c1c; font-weight: 800; font-size: 13px; padding: 6px 10px; border-radius: 8px; display: inline-block; margin-top: 6px; margin-left: 6px; }
        .note-box { margin-top: 10px; background: var(--warning-bg); padding: 10px 12px; border-radius: 10px; font-size: 12px; color: var(--warning-text); display: flex; align-items: flex-start; gap: 8px; font-weight: 500;}
        
        .card-controls { display: flex; gap: 6px; align-items: center; }
        .icon-btn { border: none; background: transparent; color: #94a3b8; cursor: pointer; padding: 6px; border-radius: 8px; transition: 0.2s; font-size: 18px;}
        .icon-btn:active { background: #e2e8f0; color: var(--text-dark);}

        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 14px; border-radius: 14px; border: 2px solid #f1f5f9; background: transparent; font-size: 14px; font-weight: 700; transition: 0.2s; color: var(--text-muted);}
        .btn-action.miejscu.active { background: #d1fae5; color: var(--success); border-color: #d1fae5; }
        .btn-action.zajecie.active { background: var(--danger); color: white; border-color: var(--danger); }

        .fab { position: fixed; bottom: calc(var(--nav-height) + 15px + env(safe-area-inset-bottom)); right: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 10px 25px rgba(99,102,241,0.4); cursor: pointer; z-index: 99; transition: transform 0.2s;}
        
        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(var(--nav-height) + env(safe-area-inset-bottom)); background: var(--card-bg); padding-bottom: env(safe-area-inset-bottom); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 25px rgba(0,0,0,0.04); border-top-left-radius: 25px; border-top-right-radius: 25px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 22px; width: 25%; height: 100%; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }
        .nav-label { font-size: 11px; font-weight: 800; margin-top: 6px; }
    </style>
</head>
<body>
    <div id="import-screen" style="padding:40px 20px; text-align:center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
        <div style="background: white; padding: 35px 25px; border-radius: 28px; box-shadow: var(--shadow); width: 100%; max-width: 400px;">
            <div style="font-size: 45px; margin-bottom: 20px; color: var(--primary);"><i class="fa-solid fa-briefcase"></i></div>
            <h2 style="margin-bottom:15px; font-size: 26px; font-weight: 800;">Mobilny Poborca</h2>
            <button style="background:var(--primary); color:white; border:none; padding:18px 30px; border-radius:16px; font-size:16px; font-weight:800; width:100%; box-shadow:0 10px 25px rgba(99,102,241,0.3);" onclick="document.getElementById('fileInp').click()">Wczytaj bazę (JSON)</button>
            <input type="file" id="fileInp" accept=".json" style="display:none;" onchange="handleFile(event)">
        </div>
    </div>

    <div id="app-container" style="display:none;">
        <div id="top-search-area">
            <div class="header">Pulpit <span id="header-counter" style="font-size:15px; background:#f1f5f9; padding:6px 12px; border-radius:12px; color:#475569;">0/0</span></div>
            <div class="search-bar-container"><input type="text" id="global-search" class="search-input" placeholder="Szukaj..." onkeyup="renderList()"></div>
        </div>
        <div id="view-pulpit" class="view-section active">
            <div class="filters" id="dynamic-filters"></div>
            <div class="list-container" id="vehicle-list"></div>
            <div class="fab" onclick="alert('Użyj edycji na istniejącej karcie')"><i class="fa-solid fa-plus"></i></div>
        </div>
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchView('pulpit', this)"><i class="fa-solid fa-layer-group"></i><span class="nav-label">Pulpit</span></div>
            <div class="nav-item" onclick="alert('Włącz widok desktop, aby zobaczyć więcej')"><i class="fa-solid fa-chart-pie"></i><span class="nav-label">Raporty</span></div>
            <div class="nav-item" onclick="alert('Włącz widok desktop, aby zobaczyć więcej')"><i class="fa-solid fa-box-archive"></i><span class="nav-label">Archiwum</span></div>
            <div class="nav-item" onclick="switchView('ustawienia', this)"><i class="fa-solid fa-gear"></i><span class="nav-label">Opcje</span></div>
        </div>
    </div>
    
    <script>
        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                localStorage.setItem('egzek_db_v7', evt.target.result);
                window.location.reload();
            };
            reader.readAsText(file);
        }
        function renderList() { /* Logika renderowania listy */ }
        function switchView(v, e) { /* Logika zakładek */ }
        window.onload = () => { if(localStorage.getItem('egzek_db_v7')) { document.getElementById('import-screen').style.display = 'none'; document.getElementById('app-container').style.display = 'block'; } }
    </script>
</body>
</html>
