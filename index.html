<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asystent Egzekucji</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #6366f1;
            --primary-light: #e0e7ff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --warning-bg: #fef9c3;
            --warning-text: #854d0e;
            --star: #eab308;
            --radius: 20px;
            --shadow: 0 4px 15px rgba(0,0,0,0.04);
            --nav-height: 85px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-dark); padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom)); overscroll-behavior-y: none; }

        /* HEADER & SEARCH */
        .header { padding: calc(20px + env(safe-area-inset-top)) 20px 15px; font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: space-between; }
        .search-bar-container { padding: 0 20px 15px 20px; }
        .search-input { width: 100%; padding: 14px 18px 14px 45px; border-radius: 14px; border: none; background: var(--card-bg) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16" fill="%2364748b"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>') no-repeat 18px center; box-shadow: var(--shadow); font-size: 15px; outline: none; transition: 0.2s;}
        .search-input:focus { box-shadow: 0 4px 15px rgba(99,102,241,0.15); }

        .view-section { display: none; padding: 0 20px; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* FILTERS */
        .filters { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 8px 16px; background: #e2e8f0; border-radius: 12px; font-weight: 600; font-size: 14px; border: none; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.2s; display: flex; align-items: center; gap: 6px;}
        .filter-btn.active { background: var(--primary-light); color: var(--primary); box-shadow: 0 2px 8px rgba(99,102,241,0.2); }
        .filter-btn.star-filter { background: #fef9c3; color: #a16207; }
        .filter-btn.star-filter.active { background: #fef08a; box-shadow: 0 2px 8px rgba(234, 179, 8, 0.3); }
        
        /* CARDS */
        .list-container { overflow-x: hidden; padding-bottom: 20px; }
        .swipe-container { position: relative; margin-bottom: 12px; border-radius: var(--radius); overflow: hidden; background: var(--danger); touch-action: pan-y; }
        .card-content { position: relative; background: var(--card-bg); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); z-index: 2; transition: transform 0.2s ease-out; }
        .delete-bg { position: absolute; top: 0; right: 0; width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; z-index: 1; }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .icon-box { font-size: 26px; margin-right: 12px; background: #f8fafc; width: 48px; height: 48px; display: flex; justify-content: center; align-items: center; border-radius: 14px; color: var(--text-dark);}
        .plate { font-weight: 800; font-size: 17px; display: flex; align-items: center; gap: 8px;}
        .star-icon { color: #cbd5e1; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .star-icon.active { color: var(--star); }
        .lp-badge { font-size: 10px; font-weight: 800; color: white; background: #475569; padding: 4px 8px; border-radius: 6px; }
        .year { font-size: 11px; font-weight: 700; color: white; background: #94a3b8; padding: 4px 8px; border-radius: 6px; }
        .desc { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }
        .vin { font-size: 11px; font-family: monospace; color: var(--text-muted); margin-top: 6px; background: #f1f5f9; padding: 6px 10px; border-radius: 8px; display: inline-block; font-weight:600;}
        .wycena-badge { background: #fee2e2; color: #b91c1c; font-weight: 800; font-size: 13px; padding: 6px 10px; border-radius: 8px; display: inline-block; margin-top: 6px; margin-left: 6px; }
        .note-box { margin-top: 10px; background: var(--warning-bg); padding: 10px 12px; border-radius: 10px; font-size: 12px; color: var(--warning-text); display: flex; align-items: flex-start; gap: 8px; font-weight: 500;}
        
        .card-controls { display: flex; gap: 6px; align-items: center; }
        .icon-btn { border: none; background: transparent; color: #94a3b8; cursor: pointer; padding: 6px; border-radius: 8px; transition: 0.2s; font-size: 18px;}
        .icon-btn:active { background: #e2e8f0; color: var(--text-dark);}

        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 14px; border-radius: 14px; border: 2px solid #f1f5f9; background: transparent; font-size: 14px; font-weight: 700; transition: 0.2s; color: var(--text-muted);}
        .btn-action.miejscu.active { background: #d1fae5; color: var(--success); border-color: #d1fae5; }
        .btn-action.zajecie.active { background: var(--danger); color: white; border-color: var(--danger); }

        /* HIDDEN CARDS */
        .hidden-card { margin-bottom:12px; background:var(--card-bg); border-radius:14px; padding:12px 18px; display:flex; justify-content:space-between; align-items:center; box-shadow: var(--shadow); border: 1px solid #f1f5f9; }
        .hidden-plate { font-weight:700; color:var(--text-muted); display:flex; align-items:center; gap: 8px; }
        .hidden-btn { background:#f1f5f9; color:var(--text-dark); border:none; padding:8px 16px; border-radius:10px; font-weight:bold; font-size:12px; cursor: pointer; transition: 0.2s;}

        /* FAB (Floating Action Button) */
        .fab { position: fixed; bottom: calc(var(--nav-height) + 15px + env(safe-area-inset-bottom)); right: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 10px 25px rgba(99,102,241,0.4); cursor: pointer; z-index: 99; transition: transform 0.2s;}
        .fab:active { transform: scale(0.95); }

        /* ANALYZES (DONUT CHART & PROTOCOL) */
        .analytics-card { background: var(--card-bg); border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .an-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; color: var(--text-dark);}
        
        .donut-wrapper { display: flex; justify-content: center; margin-bottom: 25px; }
        .donut-chart { width: 200px; height: 200px; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .donut-inner { width: 140px; height: 140px; background: var(--card-bg); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2;}
        .donut-inner strong { font-size: 24px; color: var(--text-dark); font-weight: 800; }
        .donut-inner span { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-top: 4px; letter-spacing: 0.5px;}

        .donut-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f8fafc; padding: 15px; border-radius: 16px;}
        .legend-item { display: flex; align-items: center; font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .dot { width: 12px; height: 12px; border-radius: 4px; margin-right: 10px; }
        .legend-val { margin-left: auto; color: var(--text-muted); }

        .btn-protocol { background: #0f172a; color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; margin-top: 20px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;}

        /* USTAWIENIA */
        .settings-card { background: var(--card-bg); padding: 25px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #e2e8f0; font-size: 15px; outline: none; background: #f8fafc; transition: border 0.2s;}
        .input-group input:focus, .input-group textarea:focus, .input-group select:focus { border-color: var(--primary); background: #ffffff; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(99,102,241,0.25);}
        .btn-export { width: 100%; background: #0f172a; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; font-size: 15px; margin-top: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;}
        
        .portal-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; }

        /* MODALE */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 400px; padding: 30px; border-radius: var(--radius); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); max-height: 90vh; overflow-y: auto;}
        .modal-actions { display: flex; gap: 12px; margin-top: 25px; }

        /* DOLNY PASEK NAWIGACJI */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(var(--nav-height) + env(safe-area-inset-bottom)); background: var(--card-bg); padding-bottom: env(safe-area-inset-bottom); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 25px rgba(0,0,0,0.04); border-top-left-radius: 25px; border-top-right-radius: 25px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 22px; width: 25%; height: 100%; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }
        .nav-label { font-size: 11px; font-weight: 800; margin-top: 6px; }
    </style>
</head>
<body>

    <!-- IMPORT SCREEN -->
    <div id="import-screen" style="padding:40px 20px; text-align:center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
        <div style="background: white; padding: 35px 25px; border-radius: 28px; box-shadow: var(--shadow); width: 100%; max-width: 400px;">
            <div style="font-size: 45px; margin-bottom: 20px; color: var(--primary);"><i class="fa-solid fa-briefcase"></i></div>
            <h2 style="margin-bottom:15px; font-size: 26px; font-weight: 800;">Mobilny Poborca</h2>
            <button style="background:var(--primary); color:white; border:none; padding:18px 30px; border-radius:16px; font-size:16px; font-weight:800; width:100%; box-shadow:0 10px 25px rgba(99,102,241,0.3);" onclick="document.getElementById('fileInp').click()"><i class="fa-solid fa-file-import" style="margin-right: 8px;"></i> Wczytaj bazę (JSON)</button>
            <input type="file" id="fileInp" accept=".json,.csv" style="display:none;" onchange="handleFile(event)">
        </div>
    </div>

    <!-- APLIKACJA GŁÓWNA -->
    <div id="app-container" style="display:none;">
        
        <div id="top-search-area">
            <div class="header">Pulpit <span id="header-counter" style="font-size:15px; background:#f1f5f9; padding:6px 12px; border-radius:12px; color:#475569;">0/0</span></div>
            <div class="search-bar-container">
                <input type="text" id="global-search" class="search-input" placeholder="Szukaj: rejestracja, VIN, marka..." onkeyup="renderList()">
            </div>
        </div>

        <!-- WIDOK 1: PULPIT -->
        <div id="view-pulpit" class="view-section active">
            <div class="filters" id="dynamic-filters">
                <!-- Filtry ładowane dynamicznie z JS -->
            </div>
            <div class="list-container" id="vehicle-list"></div>
            
            <!-- FAB: Dodaj auto -->
            <div class="fab" onclick="openAddModal()"><i class="fa-solid fa-plus"></i></div>
        </div>

        <!-- WIDOK 2: ANALIZY -->
        <div id="view-analizy" class="view-section">
            <div class="header">Raport <i class="fa-solid fa-chart-pie" style="color: var(--text-muted); font-size: 22px;"></i></div>
            <div id="analytics-content"></div>
        </div>

        <!-- WIDOK 3: ARCHIWUM -->
        <div id="view-archiwum" class="view-section">
            <div class="header">Archiwum <i class="fa-solid fa-box-archive" style="color: var(--text-muted); font-size: 22px;"></i></div>
            <div class="filters" id="dynamic-archive-filters"></div>
            <div id="archive-list"></div>
        </div>

        <!-- WIDOK 4: USTAWIENIA -->
        <div id="view-ustawienia" class="view-section">
            <div class="header">Ustawienia <i class="fa-solid fa-sliders" style="color: var(--text-muted); font-size: 22px;"></i></div>
            
            <div class="settings-card">
                <h4 style="margin-bottom:15px; color:var(--text-dark);">Zarządzaj Podmiotami</h4>
                <div id="alias-settings-container"></div>
                <button class="btn-save" onclick="saveSettings()"><i class="fa-solid fa-check" style="margin-right: 8px;"></i> Zapisz nazwy</button>
            </div>
            
            <div class="settings-card">
                <button class="btn-export" onclick="exportData()"><i class="fa-solid fa-file-csv"></i> Eksportuj wyniki (CSV)</button>
                <button class="btn-export" style="background:transparent; color:var(--danger); border:2px solid var(--danger); margin-top:15px; box-shadow: none;" onclick="wipeData()"><i class="fa-solid fa-trash"></i> Wyczyść urządzenie</button>
            </div>
        </div>

        <!-- NAWIGACJA -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchView('pulpit', this)"><i class="fa-solid fa-layer-group"></i><span class="nav-label">Pulpit</span></div>
            <div class="nav-item" onclick="switchView('analizy', this)"><i class="fa-solid fa-chart-pie"></i><span class="nav-label">Raporty</span></div>
            <div class="nav-item" onclick="switchView('archiwum', this)"><i class="fa-solid fa-box-archive"></i><span class="nav-label">Archiwum</span></div>
            <div class="nav-item" onclick="switchView('ustawienia', this)"><i class="fa-solid fa-gear"></i><span class="nav-label">Opcje</span></div>
        </div>
    </div>

    <!-- MODAL: DODAJ POJAZD -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; font-size: 22px; font-weight:800;">Nowy pojazd (Ręczny)</h3>
            <div class="input-group"><label>Numer rejestracyjny *</label><input type="text" id="add-rej" placeholder="KRA..."></div>
            <div class="input-group"><label>Marka i Model *</label><input type="text" id="add-marka" placeholder="Np. BMW X5"></div>
            <div class="input-group"><label>Rocznik</label><input type="number" id="add-rok"></div>
            <div class="input-group"><label>Rodzaj pojazdu</label>
                <select id="add-rodzaj">
                    <option value="SAMOCHÓD OSOBOWY">Samochód Osobowy</option>
                    <option value="SAMOCHÓD CIĘŻAROWY">Samochód Ciężarowy</option>
                    <option value="CIĄGNIK SAMOCHODOWY">Ciągnik Samochodowy</option>
                    <option value="NACZEPA CIĘŻAROWA">Naczepa/Przyczepa</option>
                    <option value="MOTOCYKL">Motocykl</option>
                    <option value="INNY">Inny</option>
                </select>
            </div>
            <div class="input-group">
                <label>Podmiot (Dłużnik) *</label>
                <input type="text" id="add-podmiot" list="podmioty-list" placeholder="Wybierz lub wpisz nowy...">
                <datalist id="podmioty-list"></datalist>
            </div>
            <div class="modal-actions">
                <button class="btn-save" style="background:#f1f5f9; color:#475569; box-shadow: none;" onclick="document.getElementById('add-modal').style.display='none'">Anuluj</button>
                <button class="btn-save" onclick="saveNewCar()">Dodaj</button>
            </div>
        </div>
    </div>

    <!-- MODAL: WYCENA ($) -->
    <div class="modal-overlay" id="wycena-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:10px; font-size: 22px; font-weight:800;">Wycena pojazdu</h3>
            <p id="wycena-car-name" style="color:var(--text-muted); font-size:13px; font-weight:600; margin-bottom: 20px;"></p>
            <input type="hidden" id="wycena-id">
            
            <div style="display:flex; gap:10px; margin-bottom: 25px;">
                <button class="portal-btn" style="background:#e0f2fe; color:#0369a1;" onclick="searchPortal('otomoto')"><i class="fa-solid fa-car"></i> Szukaj w OtoMoto</button>
                <button class="portal-btn" style="background:#f1f5f9; color:#334155;" onclick="searchPortal('google')"><i class="fa-brands fa-google"></i> Szukaj w Google</button>
            </div>

            <div class="input-group">
                <label>Twoja ostateczna wycena (PLN)</label>
                <input type="text" id="wycena-val" placeholder="np. 45000">
            </div>
            <div class="modal-actions">
                <button class="btn-save" style="background:#f1f5f9; color:#475569; box-shadow: none;" onclick="document.getElementById('wycena-modal').style.display='none'">Anuluj</button>
                <button class="btn-save" onclick="saveWycena()">Zapisz wycenę</button>
            </div>
        </div>
    </div>

    <!-- MODAL: EDYCJA -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; font-size: 22px; font-weight:800;">Edycja danych</h3>
            <input type="hidden" id="edit-id">
            <div class="input-group"><label>Rejestracja</label><input type="text" id="edit-rej"></div>
            <div class="input-group"><label>Rocznik</label><input type="number" id="edit-rok"></div>
            <div class="input-group"><label>VIN</label><input type="text" id="edit-vin"></div>
            <div class="input-group"><label>Notatka</label><textarea id="edit-notatka" rows="3" placeholder="Brak kluczyków, uszkodzenia..."></textarea></div>
            <div class="modal-actions">
                <button class="btn-save" style="background:#f1f5f9; color:#475569; box-shadow: none;" onclick="document.getElementById('edit-modal').style.display='none'">Anuluj</button>
                <button class="btn-save" onclick="saveEdit()">Zapisz</button>
            </div>
        </div>
    </div>

    <!-- MODAL: DO PROTOKOŁU -->
    <div class="modal-overlay" id="protocol-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px; font-size: 20px; font-weight:800; color: var(--text-dark);">📋 Do protokołu</h3>
            <p style="font-size:13px; color:var(--text-muted); margin-bottom:15px; font-weight:500;">Lista aut ze statusem "Zajęcie".</p>
            <textarea id="protocol-text" style="width:100%; height:250px; padding:14px; border-radius:14px; border:1px solid #e2e8f0; font-size:13px; font-family:monospace; resize:none; background:#f8fafc; color:#0f172a; line-height:1.5;"></textarea>
            <div class="modal-actions">
                <button class="btn-save" style="background:#f1f5f9; color:#475569; box-shadow: none;" onclick="document.getElementById('protocol-modal').style.display='none'">Zamknij</button>
                <button class="btn-save" onclick="copyProtocol()">Skopiuj tekst</button>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        let aliases = {}; 
        let activeFilter = 'all';
        let archiveFilter = 'all';

        let touchStartX = 0;
        let pressTimer = null;

        function getIcon(rodzaj) {
            if(!rodzaj) return '🚗';
            const r = rodzaj.toLowerCase();
            if(r.includes('ciągnik')) return '🚜';
            if(r.includes('naczepa') || r.includes('przyczepa')) return '🚛';
            if(r.includes('motoc') || r.includes('motorow')) return '🏍️';
            if(r.includes('osobow')) return '🚗';
            return '🚚';
        }

        window.onload = () => {
            if(localStorage.getItem('egzek_db_v7')) {
                db = JSON.parse(localStorage.getItem('egzek_db_v7'));
                if(localStorage.getItem('egzek_alias_v7')) aliases = JSON.parse(localStorage.getItem('egzek_alias_v7'));
                startApp();
            }
        };

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                if(file.name.endsWith('.json')) {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        db = parsed.map((item, idx) => ({
                            ...item, 
                            id: idx, 
                            byl: false, 
                            zajeto: false, 
                            archived: false, 
                            ukryty: false, 
                            notatka: "",
                            gwiazdka: false,
                            wycena: ""
                        }));
                        localStorage.setItem('egzek_db_v7', JSON.stringify(db));
                        startApp();
                    } catch(err) {
                        alert("Błąd przetwarzania pliku JSON.");
                    }
                }
            };
            reader.readAsText(file);
        }

        function getUniqueEntities() {
            return [...new Set(db.map(i => i.podmiot))];
        }

        function getAlias(podmiot) {
            return aliases[podmiot] || podmiot;
        }

        function startApp() {
            document.getElementById('import-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            
            // Inicjalizacja aliasów jeśli brakuje
            const entities = getUniqueEntities();
            entities.forEach(ent => {
                if(!aliases[ent]) aliases[ent] = ent;
            });
            localStorage.setItem('egzek_alias_v7', JSON.stringify(aliases));

            buildDynamicFilters();
            buildSettingsMenu();
            updateUI();
        }

        function buildDynamicFilters() {
            const entities = getUniqueEntities();
            
            // Pulpit Filters
            let htmlPulpit = `<button class="filter-btn active" onclick="setFilter('all', this, false)">Wszystkie</button>`;
            htmlPulpit += `<button class="filter-btn star-filter" onclick="setFilter('star', this, false)">⭐ Wytypowane</button>`;
            entities.forEach(ent => {
                htmlPulpit += `<button class="filter-btn" onclick="setFilter('${ent}', this, false)">${getAlias(ent)}</button>`;
            });
            document.getElementById('dynamic-filters').innerHTML = htmlPulpit;

            // Archive Filters
            let htmlArc = `<button class="filter-btn active" onclick="setFilter('all', this, true)">Wszystkie</button>`;
            entities.forEach(ent => {
                htmlArc += `<button class="filter-btn" onclick="setFilter('${ent}', this, true)">${getAlias(ent)}</button>`;
            });
            document.getElementById('dynamic-archive-filters').innerHTML = htmlArc;

            // Datalist do modala dodawania
            let dt = '';
            entities.forEach(ent => { dt += `<option value="${ent}">`; });
            document.getElementById('podmioty-list').innerHTML = dt;
        }

        function buildSettingsMenu() {
            const entities = getUniqueEntities();
            let html = '';
            entities.forEach(ent => {
                html += `
                <div class="input-group">
                    <label>Alias dla: ${ent}</label>
                    <input type="text" id="alias-in-${ent.replace(/\s+/g, '')}" value="${aliases[ent]}" data-original="${ent}">
                </div>`;
            });
            document.getElementById('alias-settings-container').innerHTML = html;
        }

        function saveSettings() {
            const entities = getUniqueEntities();
            entities.forEach(ent => {
                const safeId = ent.replace(/\s+/g, '');
                const input = document.getElementById(`alias-in-${safeId}`);
                if(input && input.value.trim() !== '') {
                    aliases[ent] = input.value.trim();
                }
            });
            localStorage.setItem('egzek_alias_v7', JSON.stringify(aliases));
            buildDynamicFilters();
            updateUI();
            
            if(navigator.vibrate) navigator.vibrate(50); 
            const btn = document.querySelector('#view-ustawienia .btn-save');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Zapisano!';
            btn.style.background = 'var(--success)';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = 'var(--primary)';
            }, 1500);
        }

        function switchView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');

            if(viewId === 'pulpit') document.getElementById('top-search-area').style.display = 'block';
            else document.getElementById('top-search-area').style.display = 'none';

            if(viewId === 'analizy') renderAnalytics();
            if(viewId === 'archiwum') renderArchive();
        }

        function setFilter(flt, el, isArchive) {
            if(isArchive) {
                archiveFilter = flt;
                renderArchive();
            } else {
                activeFilter = flt;
                renderList();
            }
            
            const parent = el.parentElement;
            parent.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        /* --- AKCJE NA KARCIE --- */
        function toggleAction(id, type) {
            const idx = db.findIndex(i => i.id === id);
            if(type === 'zajeto') {
                db[idx].zajeto = !db[idx].zajeto;
                if(db[idx].zajeto) db[idx].byl = true;
            } else {
                db[idx].byl = !db[idx].byl;
                if(!db[idx].byl) db[idx].zajeto = false;
            }
            saveDb();
            renderList();
            updateCounters();
        }

        function toggleStar(id) {
            const idx = db.findIndex(i => i.id === id);
            db[idx].gwiazdka = !db[idx].gwiazdka;
            if(navigator.vibrate) navigator.vibrate(20);
            saveDb();
            renderList();
        }

        function toggleHide(id) {
            const idx = db.findIndex(i => i.id === id);
            db[idx].ukryty = !db[idx].ukryty;
            saveDb();
            renderList();
        }

        function archiveItem(id) {
            const idx = db.findIndex(i => i.id === id);
            db[idx].archived = true;
            if(navigator.vibrate) navigator.vibrate(50);
            saveDb();
            renderList();
            updateCounters();
        }

        function restoreItem(id) {
            const idx = db.findIndex(i => i.id === id);
            db[idx].archived = false;
            saveDb();
            renderArchive();
            updateCounters();
        }

        /* --- EDYCJA MODAL --- */
        function openEdit(id) {
            if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
            const item = db.find(i => i.id === id);
            document.getElementById('edit-id').value = item.id;
            document.getElementById('edit-rej').value = item.rejestracja;
            document.getElementById('edit-rok').value = item.rok || '';
            document.getElementById('edit-vin').value = item.vin || '';
            document.getElementById('edit-notatka').value = item.notatka || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function saveEdit() {
            const id = parseInt(document.getElementById('edit-id').value);
            const idx = db.findIndex(i => i.id === id);
            db[idx].rejestracja = document.getElementById('edit-rej').value;
            db[idx].rok = document.getElementById('edit-rok').value;
            db[idx].vin = document.getElementById('edit-vin').value;
            db[idx].notatka = document.getElementById('edit-notatka').value;
            saveDb();
            document.getElementById('edit-modal').style.display = 'none';
            renderList();
        }

        /* --- WYCENA ($) MODAL --- */
        let currentWycenaCar = null;
        
        function openWycena(id) {
            currentWycenaCar = db.find(i => i.id === id);
            document.getElementById('wycena-id').value = currentWycenaCar.id;
            document.getElementById('wycena-car-name').innerText = `${currentWycenaCar.marka} ${currentWycenaCar.model} (${currentWycenaCar.rok || '-'})`;
            document.getElementById('wycena-val').value = currentWycenaCar.wycena || '';
            document.getElementById('wycena-modal').style.display = 'flex';
        }

        function saveWycena() {
            const id = parseInt(document.getElementById('wycena-id').value);
            const idx = db.findIndex(i => i.id === id);
            db[idx].wycena = document.getElementById('wycena-val').value;
            saveDb();
            document.getElementById('wycena-modal').style.display = 'none';
            renderList();
        }

        function searchPortal(portal) {
            if(!currentWycenaCar) return;
            let query = `${currentWycenaCar.marka} ${currentWycenaCar.model} ${currentWycenaCar.rok || ''}`;
            query = encodeURIComponent(query.trim());
            
            let url = '';
            if(portal === 'otomoto') {
                url = `https://www.otomoto.pl/oferty/q-${query}`;
            } else {
                url = `https://www.google.com/search?q=cena+używany+${query}`;
            }
            window.open(url, '_blank');
        }

        /* --- DODAJ AUTO MODAL --- */
        function openAddModal() {
            document.getElementById('add-rej').value = '';
            document.getElementById('add-marka').value = '';
            document.getElementById('add-rok').value = '';
            document.getElementById('add-podmiot').value = '';
            document.getElementById('add-modal').style.display = 'flex';
        }

        function saveNewCar() {
            const rej = document.getElementById('add-rej').value.trim().toUpperCase();
            const marka = document.getElementById('add-marka').value.trim().toUpperCase();
            let podmiot = document.getElementById('add-podmiot').value.trim();
            const rok = document.getElementById('add-rok').value;
            const rodzaj = document.getElementById('add-rodzaj').value;

            if(!rej || !marka || !podmiot) {
                alert("Wypełnij wymagane pola (Rejestracja, Marka, Podmiot)!");
                return;
            }

            const newId = db.length > 0 ? Math.max(...db.map(i => i.id)) + 1 : 1;
            
            const newObj = {
                id: newId,
                lp: "RĘCZNE",
                rodzaj: rodzaj,
                rejestracja: rej,
                marka: marka,
                model: "",
                typ: "---",
                vin: "---",
                rok: rok,
                podmiot: podmiot,
                byl: false,
                zajeto: false,
                archived: false,
                ukryty: false,
                notatka: "Dodano ręcznie w terenie",
                gwiazdka: true, // Od razu zaznaczmy jako gwiazdka zeby sie wyroznialo
                wycena: ""
            };

            db.unshift(newObj); // na gore listy
            saveDb();
            
            // Jeśli to nowy podmiot, odświeżamy filtry
            if(!aliases[podmiot]) {
                aliases[podmiot] = podmiot;
                localStorage.setItem('egzek_alias_v7', JSON.stringify(aliases));
                buildDynamicFilters();
                buildSettingsMenu();
            }

            document.getElementById('add-modal').style.display = 'none';
            renderList();
            updateCounters();
        }

        function attachSwipeEvents() {
            document.querySelectorAll('.card-content').forEach(card => {
                let currentX = 0;
                let isSwiping = false;

                card.addEventListener('touchstart', e => {
                    touchStartX = e.changedTouches[0].screenX;
                    isSwiping = false;
                    const id = parseInt(card.dataset.id);
                    pressTimer = setTimeout(() => {
                        if (!isSwiping) openEdit(id);
                    }, 500); 
                }, {passive: true});

                card.addEventListener('touchmove', e => {
                    currentX = e.changedTouches[0].screenX - touchStartX;
                    if(Math.abs(currentX) > 10) {
                        isSwiping = true;
                        clearTimeout(pressTimer);
                    }
                    if(currentX < 0 && currentX > -120) {
                        card.style.transform = `translateX(${currentX}px)`;
                    }
                }, {passive: true});

                card.addEventListener('touchend', e => {
                    clearTimeout(pressTimer);
                    if(currentX < -70) {
                        card.style.transform = `translateX(-100%)`;
                        setTimeout(() => archiveItem(parseInt(card.dataset.id)), 250);
                    } else {
                        card.style.transform = `translateX(0px)`;
                    }
                    currentX = 0;
                });
            });
        }

        function updateUI() {
            renderList();
            updateCounters();
        }

        function saveDb() { localStorage.setItem('egzek_db_v7', JSON.stringify(db)); }

        function renderList() {
            const container = document.getElementById('vehicle-list');
            const searchVal = document.getElementById('global-search').value.toLowerCase();
            
            let toRender = db.filter(i => !i.archived);
            
            if(activeFilter === 'star') {
                toRender = toRender.filter(i => i.gwiazdka);
            } else if(activeFilter !== 'all') {
                toRender = toRender.filter(i => i.podmiot === activeFilter);
            }

            if(searchVal) {
                toRender = toRender.filter(i => 
                    i.rejestracja.toLowerCase().includes(searchVal) || 
                    (i.vin && i.vin.toLowerCase().includes(searchVal)) ||
                    i.marka.toLowerCase().includes(searchVal) ||
                    (i.model && i.model.toLowerCase().includes(searchVal))
                );
            }

            container.innerHTML = toRender.map(i => {
                if(i.ukryty) {
                    return `
                    <div class="hidden-card">
                        <div class="hidden-plate">
                            <i class="fa-solid fa-eye-slash" style="margin-right:10px;"></i> 
                            ${i.gwiazdka ? '<i class="fa-solid fa-star" style="color:var(--star); margin-right:4px;"></i>' : ''}
                            ${i.rejestracja}
                        </div>
                        <button class="hidden-btn" onclick="toggleHide(${i.id})">Rozwiń</button>
                    </div>`;
                }

                return `
                <div class="swipe-container">
                    <div class="delete-bg"><i class="fa-solid fa-box-archive"></i></div>
                    <div class="card-content" data-id="${i.id}">
                        <div class="card-top">
                            <div style="display:flex; align-items:center;">
                                <div class="icon-box">${getIcon(i.rodzaj)}</div>
                                <div>
                                    <div class="plate">
                                        <i class="fa-solid fa-star star-icon ${i.gwiazdka ? 'active' : ''}" onclick="toggleStar(${i.id})"></i>
                                        ${i.rejestracja}
                                        <span class="lp-badge">LP: ${i.lp}</span>
                                        ${i.rok ? `<span class="year">${i.rok}</span>` : ''}
                                    </div>
                                    <div class="desc">${i.marka} ${i.model}</div>
                                </div>
                            </div>
                            <div class="card-controls">
                                <button class="icon-btn" onclick="openWycena(${i.id})"><i class="fa-solid fa-comment-dollar"></i></button>
                                <button class="icon-btn" onclick="openEdit(${i.id})"><i class="fa-solid fa-pen"></i></button>
                                <button class="icon-btn" onclick="toggleHide(${i.id})"><i class="fa-regular fa-eye-slash"></i></button>
                            </div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                            <div>
                                <div class="vin">VIN: ${i.vin}</div>
                                ${i.wycena ? `<div class="wycena-badge">Wycena: ${i.wycena} zł</div>` : ''}
                            </div>
                            <span style="font-size:11px; font-weight:800; color:var(--primary);">${getAlias(i.podmiot)}</span>
                        </div>
                        
                        ${i.notatka ? `<div class="note-box"><i class="fa-solid fa-note-sticky" style="margin-top:2px;"></i> <div>${i.notatka}</div></div>` : ''}

                        <div class="actions">
                            <button class="btn-action miejscu ${i.byl ? 'active' : ''}" onclick="toggleAction(${i.id}, 'byl')">
                                <i class="fa-solid fa-location-dot" style="margin-right:4px;"></i> Na miejscu
                            </button>
                            <button class="btn-action zajecie ${i.zajeto ? 'active' : ''}" onclick="toggleAction(${i.id}, 'zajeto')">
                                <i class="fa-solid fa-ban" style="margin-right:4px;"></i> Zajęcie
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            attachSwipeEvents();
        }

        function renderArchive() {
            const container = document.getElementById('archive-list');
            let arc = db.filter(i => i.archived);
            if(archiveFilter !== 'all') arc = arc.filter(i => i.podmiot === archiveFilter);

            if(arc.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);"><i class="fa-solid fa-inbox" style="font-size:30px; margin-bottom:10px; opacity:0.5;"></i><br>Archiwum jest puste.</div>';
                return;
            }
            container.innerHTML = arc.map(i => `
                <div style="background:var(--card-bg); padding:16px; border-radius:16px; margin-bottom:12px; box-shadow:var(--shadow);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center;">
                            <div class="icon-box" style="font-size:18px; width:40px; height:40px; margin-right:12px; background:#f1f5f9;">${getIcon(i.rodzaj)}</div>
                            <div>
                                <div style="font-weight:800; text-decoration:line-through; color:var(--text-muted); font-size: 15px;">${i.rejestracja}</div>
                                <div style="font-size:12px; color:#94a3b8; font-weight: 700; margin-top: 4px;">${getAlias(i.podmiot)}</div>
                            </div>
                        </div>
                        <button style="background:#e0e7ff; color:var(--primary); border:none; padding:10px 14px; border-radius:10px; font-weight:bold; font-size:14px; cursor:pointer;" onclick="restoreItem(${i.id})"><i class="fa-solid fa-arrow-rotate-left"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderAnalytics() {
            const container = document.getElementById('analytics-content');
            let html = '';
            const entities = getUniqueEntities();

            entities.forEach(podm => {
                const pData = db.filter(i => i.podmiot === podm && !i.archived);
                const total = pData.length;
                if(total === 0) return;

                const zajete = pData.filter(i => i.zajeto).length;
                const miejscu = pData.filter(i => i.byl && !i.zajeto).length;
                const brak = total - zajete - miejscu;
                
                const pZaj = total > 0 ? (zajete / total) * 100 : 0;
                const pMsc = total > 0 ? (miejscu / total) * 100 : 0;

                const grad = `conic-gradient(var(--danger) 0% ${pZaj}%, var(--success) ${pZaj}% ${pZaj+pMsc}%, #e2e8f0 ${pZaj+pMsc}% 100%)`;

                html += `
                <div class="analytics-card">
                    <div class="an-title">${getAlias(podm)}</div>
                    
                    <div class="donut-wrapper">
                        <div class="donut-chart" style="background: ${grad};">
                            <div class="donut-inner">
                                <strong>${total}</strong>
                                <span>RAZEM</span>
                            </div>
                        </div>
                    </div>

                    <div class="donut-legend">
                        <div class="legend-item"><div class="dot" style="background: var(--danger);"></div>Zajęte <span class="legend-val">${zajete}</span></div>
                        <div class="legend-item"><div class="dot" style="background: var(--success);"></div>Na miejscu <span class="legend-val">${miejscu}</span></div>
                        <div class="legend-item"><div class="dot" style="background: #e2e8f0;"></div>Nieruszone <span class="legend-val">${brak}</span></div>
                    </div>

                    <button class="btn-protocol" onclick="generateProtocol('${podm}')"><i class="fa-regular fa-copy" style="margin-right:8px;"></i> Kopiuj do protokołu</button>
                </div>`;
            });
            
            container.innerHTML = html;
        }

        function generateProtocol(podmiot) {
            const zData = db.filter(i => i.podmiot === podmiot && i.zajeto && !i.archived);
            if(zData.length === 0) {
                alert("Brak zajętych pojazdów do wpisania w protokół.");
                return;
            }

            let text = `Podsumowanie zajętych pojazdów - ${getAlias(podmiot)}:\n\n`;
            zData.forEach((i, idx) => {
                text += `${idx + 1}. POJAZD: ${i.rodzaj}, NR REJ.: ${i.rejestracja}\n`;
                text += `   MARKA/MODEL: ${i.marka} ${i.model}, ROK PROD.: ${i.rok}\n`;
                text += `   VIN: ${i.vin}\n`;
                if(i.wycena) text += `   SZACOWANA WARTOŚĆ: ${i.wycena} zł\n`;
                if(i.notatka) text += `   UWAGI: ${i.notatka}\n`;
                text += `\n`;
            });

            document.getElementById('protocol-text').value = text;
            document.getElementById('protocol-modal').style.display = 'flex';
        }

        function copyProtocol() {
            const txtArea = document.getElementById('protocol-text');
            txtArea.select();
            document.execCommand('copy');
            if(navigator.vibrate) navigator.vibrate(50);
            
            const btn = document.querySelector('#protocol-modal .btn-save:last-child');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Skopiowano!';
            btn.style.background = 'var(--success)';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = 'var(--primary)';
            }, 1500);
        }

        function updateCounters() {
            const activeDb = db.filter(i => !i.archived);
            const done = activeDb.filter(i => i.byl || i.zajeto).length;
            document.getElementById('header-counter').innerText = `${done}/${activeDb.length}`;
        }

        function exportData() {
            let csv = "LP;Rodzaj;Rejestracja;Marka;Model;VIN;Rok;Podmiot;Byl_na_miejscu;Zajecie;W_archiwum;Gwiazdka;Wycena;Notatka\n";
            db.forEach(i => {
                const pod = getAlias(i.podmiot);
                const not = i.notatka ? i.notatka.replace(/;/g, ',').replace(/\n/g, ' ') : "";
                csv += `${i.lp};"${i.rodzaj}";${i.rejestracja};"${i.marka}";"${i.model}";${i.vin};${i.rok};"${pod}";${i.byl?"Tak":"Nie"};${i.zajeto?"Tak":"Nie"};${i.archived?"Tak":"Nie"};${i.gwiazdka?"Tak":"Nie"};"${i.wycena}";"${not}"\n`;
            });
            const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "egzekucja_wyniki_" + new Date().toISOString().slice(0,10) + ".csv";
            link.click();
        }

        function wipeData() {
            if(confirm("Czy na pewno chcesz usunąć wszystko z telefonu? Niezapisane zmiany przepadną!")) {
                localStorage.removeItem('egzek_db_v7');
                localStorage.removeItem('egzek_alias_v7');
                window.location.reload();
            }
        }
    </script>
</body>
</html>
